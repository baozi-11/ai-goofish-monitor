name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ai-goofish
  GHCR_IMAGE: ghcr.io/baozi-11/ai-goofish
  ALIYUN_IMAGE: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com/baozi-localhost/ai-goofish-monitor

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.ALIYUN_IMAGE }}:latest
            ${{ env.ALIYUN_IMAGE }}:${{ github.sha }}
