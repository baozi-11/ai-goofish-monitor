name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/baozi-11/ai-goofish
  GHCR_BASE_IMAGE: ghcr.io/baozi-11/ai-goofish-base
  ALIYUN_IMAGE: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com/baozi-localhost/ai-goofish-monitor
  ALIYUN_BASE_IMAGE: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com/baozi-localhost/ai-goofish-monitor-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    outputs:
      base_image: ${{ env.GHCR_BASE_IMAGE }}:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          pull: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_BASE_IMAGE }}:latest
            ${{ env.GHCR_BASE_IMAGE }}:${{ github.sha }}
            ${{ env.ALIYUN_BASE_IMAGE }}:latest
            ${{ env.ALIYUN_BASE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ai-goofish-base-docker
          cache-to: type=gha,scope=ai-goofish-base-docker,mode=max

  build-and-push:
    needs: build-base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-59swusuntfg1kose.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          push: true
          pull: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.build-base.outputs.base_image }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.ALIYUN_IMAGE }}:latest
            ${{ env.ALIYUN_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ai-goofish-release-docker
          cache-to: type=gha,scope=ai-goofish-release-docker,mode=max
